function toH(t){let r="";for(let i=0;i<t.length;i++){const c=t[i];if(/[\u3040-\u309f]/.test(c)){r+=c;}else if(/[\u30a0-\u30ff]/.test(c)){r+=String.fromCharCode(c.charCodeAt(0)-0x60);}else if(KR[c]){r+=KR[c];}else{r+=c;}}return r;}
function toR(t){const h=toH(t);let r="",i=0;while(i<h.length){if(h[i]==="っ"&&i+1<h.length){const nx=RM[h[i+1]];if(nx){r+=nx[0];i++;continue;}}if(i+1<h.length&&RM[h[i]+h[i+1]]){r+=RM[h[i]+h[i+1]];i+=2;continue;}if(RM[h[i]]){r+=RM[h[i]];i++;continue;}r+=h[i];i++;}return r;}

function cj(v,t){
  if(t==="expression")return{n:"",p:"",te:""};
  if(v==="する")return{n:"しない",p:"した",te:"して"};
  if(v==="来る"||v==="くる")return{n:"こない",p:"きた",te:"きて"};
  if(v.endsWith("する")&&v!=="する"){const s=v.slice(0,-2);return{n:s+"しない",p:s+"した",te:s+"して"};}
  if((v.endsWith("くる")&&v!=="くる")||(v.endsWith("来る")&&v!=="来る")){const s=v.slice(0,-2);return{n:s+"こない",p:s+"きた",te:s+"きて"};}
  if(t==="ru-verb"){const s=v.slice(0,-1);return{n:s+"ない",p:s+"た",te:s+"て"};}
  if(t==="u-verb"){
    if(v==="行く")return{n:"行かない",p:"行った",te:"行って"};
    const e=v.slice(-1),s=v.slice(0,-1);
    const ng={"う":"わない","く":"かない","ぐ":"がない","す":"さない","つ":"たない","ぬ":"なない","ぶ":"ばない","む":"まない","る":"らない"};
    const pa={"う":"った","つ":"った","る":"った","む":"んだ","ぶ":"んだ","ぬ":"んだ","く":"いた","ぐ":"いだ","す":"した"};
    const te={"う":"って","つ":"って","る":"って","む":"んで","ぶ":"んで","ぬ":"んで","く":"いて","ぐ":"いで","す":"して"};
    return{n:s+(ng[e]||""),p:s+(pa[e]||""),te:s+(te[e]||"")};
  }
  return{n:"",p:"",te:""};
}
function mx(v,t){
  if(t==="expression")return{po:"",pa:"",ca:"",pl:""};
  if(v==="する")return{po:"できる",pa:"される",ca:"させる",pl:"します"};
  if(v==="来る"||v==="くる")return{po:"こられる",pa:"こられる",ca:"こさせる",pl:"きます"};
  if(v.endsWith("する")){const s=v.slice(0,-2);return{po:s+"できる",pa:s+"される",ca:s+"させる",pl:s+"します"};}
  if(v.endsWith("くる")||v.endsWith("来る")){const s=v.slice(0,-2);return{po:s+"こられる",pa:s+"こられる",ca:s+"こさせる",pl:s+"きます"};}
  if(t==="ru-verb"){const s=v.slice(0,-1);return{po:s+"られる",pa:s+"られる",ca:s+"させる",pl:s+"ます"};}
  if(t==="u-verb"){
    const e=v.slice(-1),s=v.slice(0,-1);
    const pt={"う":"える","く":"ける","ぐ":"げる","す":"せる","つ":"てる","ぬ":"ねる","ぶ":"べる","む":"める","る":"れる"};
    const ps={"う":"われる","く":"かれる","ぐ":"がれる","す":"される","つ":"たれる","ぬ":"なれる","ぶ":"ばれる","む":"まれる","る":"られる"};
    const cs={"う":"わせる","く":"かせる","ぐ":"がせる","す":"させる","つ":"たせる","ぬ":"なせる","ぶ":"ばせる","む":"ませる","る":"らせる"};
    const pl={"う":"います","く":"きます","ぐ":"ぎます","す":"します","つ":"ちます","ぬ":"にます","ぶ":"びます","む":"みます","る":"ります"};
    return{po:s+(pt[e]||""),pa:s+(ps[e]||""),ca:s+(cs[e]||""),pl:s+(pl[e]||"")};
  }
  return{po:"",pa:"",ca:"",pl:""};
}
function genForms(v,t){
  const b=cj(v,t),x=mx(v,t),p=x.pl,ps=p.endsWith("ます")?p.slice(0,-2):"";
  const f={};
  f["Dictionary"]=v;f["Negative (plain)"]=b.n;f["Past (plain)"]=b.p;
  if(b.n?.endsWith("ない"))f["Past negative (plain)"]=b.n.slice(0,-1)+"かった";
  f["Te-form"]=b.te;f["Potential"]=x.po;f["Passive"]=x.pa;f["Causative"]=x.ca;
  if(t==="ru-verb")f["Volitional (plain)"]=v.slice(0,-1)+"よう";
  else if(t==="u-verb"){const vl={"う":"おう","く":"こう","ぐ":"ごう","す":"そう","つ":"とう","ぬ":"のう","ぶ":"ぼう","む":"もう","る":"ろう"};f["Volitional (plain)"]=v.slice(0,-1)+(vl[v.slice(-1)]||"");}
  else if(v==="する")f["Volitional (plain)"]="しよう";
  else if(v==="来る"||v==="くる")f["Volitional (plain)"]="こよう";
  else if(v.endsWith("する"))f["Volitional (plain)"]=v.slice(0,-2)+"しよう";
  else if(v.endsWith("くる")||v.endsWith("来る"))f["Volitional (plain)"]=v.slice(0,-2)+"こよう";
  if(ps)f["Tai-form (want to)"]=ps+"たい";
  f["Polite (masu)"]=p;
  if(ps){f["Polite negative"]=ps+"ません";f["Polite past"]=ps+"ました";f["Polite past negative"]=ps+"ませんでした";f["Polite volitional"]=ps+"ましょう";}
  if(t==="ru-verb")f["Conditional (ba)"]=v.slice(0,-1)+"れば";
  else if(t==="u-verb"){const ba={"う":"えば","く":"けば","ぐ":"げば","す":"せば","つ":"てば","ぬ":"ねば","ぶ":"べば","む":"めば","る":"れば"};f["Conditional (ba)"]=v.slice(0,-1)+(ba[v.slice(-1)]||"");}
  else if(v==="する")f["Conditional (ba)"]="すれば";
  else if(v==="来る"||v==="くる")f["Conditional (ba)"]="くれば";
  else if(v.endsWith("する"))f["Conditional (ba)"]=v.slice(0,-2)+"すれば";
  else if(v.endsWith("くる")||v.endsWith("来る"))f["Conditional (ba)"]=v.slice(0,-2)+"くれば";
  if(b.p)f["Conditional (tara)"]=b.p+"ら";
  if(t==="ru-verb")f["Imperative"]=v.slice(0,-1)+"ろ";
  else if(t==="u-verb"){const im={"う":"え","く":"け","ぐ":"げ","す":"せ","つ":"て","ぬ":"ね","ぶ":"べ","む":"め","る":"れ"};f["Imperative"]=v.slice(0,-1)+(im[v.slice(-1)]||"");}
  else if(v==="する")f["Imperative"]="しろ";
  else if(v==="来る"||v==="くる")f["Imperative"]="こい";
  else if(v.endsWith("する"))f["Imperative"]=v.slice(0,-2)+"しろ";
  else if(v.endsWith("くる")||v.endsWith("来る"))f["Imperative"]=v.slice(0,-2)+"こい";
  if(v)f["Prohibitive (don't)"]=v+"な";
  return Object.fromEntries(Object.entries(f).filter(([,val])=>val));
}

const verbs=RV.map(v=>{
  const forms=genForms(v.j,v.t),pattern=SP[v.j]||"",kanji=KO[v.j]||v.j,hiragana=toH(v.j),romaji=toR(v.j);
  return{english:v.e,japanese:v.j,type:v.t,forms,pattern,kanji,hiragana,romaji};
});

const FC=[
  {name:"Plain forms",keys:["Dictionary","Negative (plain)","Past (plain)","Past negative (plain)","Te-form"]},
  {name:"Polite forms",keys:["Polite (masu)","Polite negative","Polite past","Polite past negative","Polite volitional"]},
  {name:"Other forms",keys:["Tai-form (want to)","Volitional (plain)","Potential","Passive","Causative","Conditional (ba)","Conditional (tara)","Imperative","Prohibitive (don't)"]},
];

const mono="'JetBrains Mono','Fira Code','SF Mono','Cascadia Code',Consolas,monospace";
const sans="'Noto Sans JP',system-ui,sans-serif";

// Simple localStorage wrapper (replaces window.storage for standalone use)
const storage={
  get(k){try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,v);return true;}catch{return false;}},
};

function App(){
  const[page,setPage]=useState("search");
  const[query,setQuery]=useState("");
  const[selected,setSelected]=useState(null);
  const[favs,setFavs]=useState(()=>{
    try{const r=storage.get("verb-favs");if(r?.value)return new Set(JSON.parse(r.value));}catch{}return new Set();
  });
  const inputRef=useRef(null);

  const toggleFav=useCallback((jp)=>{
    setFavs(prev=>{const next=new Set(prev);if(next.has(jp))next.delete(jp);else next.add(jp);try{storage.set("verb-favs",JSON.stringify([...next]));}catch{}return next;});
  },[]);

  const filtered=useMemo(()=>{
    if(!query.trim())return[];
    const q=query.toLowerCase().trim();
    return verbs.filter(v=>v.english.toLowerCase().includes(q)||v.japanese.includes(q)||v.hiragana.includes(q)||v.romaji.includes(q));
  },[query]);

  const favVerbs=useMemo(()=>verbs.filter(v=>favs.has(v.japanese)),[favs]);

  if(selected){
    const v=selected,isFav=favs.has(v.japanese);
    return(
      <div style={{minHeight:"100dvh",background:"#0c0c0c",color:"#d4d4d4",fontFamily:mono,fontSize:"13px",lineHeight:1.7}}>
        <div style={{padding:"14px 18px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:"#555",fontSize:"13px",fontFamily:mono,cursor:"pointer",padding:"4px 0"}}>← back</button>
          <button onClick={()=>toggleFav(v.japanese)} style={{background:"none",border:"1px solid #222",color:isFav?"#d4a":"#444",fontSize:"12px",fontFamily:mono,cursor:"pointer",padding:"5px 14px"}}>
            {isFav?"★ saved":"☆ save"}
          </button>
        </div>
        <div style={{padding:"12px 18px 16px",borderBottom:"1px solid #1a1a1a"}}>
          <div style={{fontSize:"15px",fontWeight:600,marginBottom:"8px",color:"#e0e0e0"}}>{v.english}</div>
          <div style={{color:"#666"}}>Type: <span style={{color:"#999"}}>{v.type}</span></div>
          <div style={{color:"#666"}}>Kanji:{"    "}<span style={{color:"#d4d4d4",fontFamily:sans}}>{v.kanji}</span></div>
          <div style={{color:"#666"}}>Hiragana: <span style={{color:"#d4d4d4",fontFamily:sans}}>{v.hiragana}</span></div>
          <div style={{color:"#666"}}>Romaji:{"   "}<span style={{color:"#d4d4d4"}}>{v.romaji}</span></div>
          {v.pattern&&<div style={{color:"#666"}}>Structure: <span style={{color:"#999"}}>{v.pattern} <span style={{fontFamily:sans}}>{v.kanji}</span></span></div>}
        </div>
        <div style={{padding:"0 18px 60px"}}>
          {FC.map(cat=>{
            const items=cat.keys.filter(k=>v.forms[k]);
            if(!items.length)return null;
            return(
              <div key={cat.name}>
                <div style={{padding:"14px 0 6px",color:"#555",fontSize:"12px"}}>── {cat.name} ──</div>
                {items.map(k=>{
                  const val=v.forms[k],rom=toR(val);
                  return(
                    <div key={k} style={{display:"grid",gridTemplateColumns:"minmax(0,1.2fr) minmax(0,1fr) minmax(0,1fr)",padding:"3px 0",gap:"8px",alignItems:"baseline"}}>
                      <span style={{color:"#777",fontSize:"12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{k}</span>
                      <span style={{color:"#d4d4d4",fontFamily:sans,fontSize:"15px"}}>{val}</span>
                      <span style={{color:"#555",fontSize:"12px",textAlign:"right"}}>{rom}</span>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  const listData=page==="favourites"?favVerbs:filtered;

  return(
    <div style={{minHeight:"100dvh",background:"#0c0c0c",color:"#d4d4d4",fontFamily:mono,fontSize:"13px"}}>
      <div style={{display:"flex",borderBottom:"1px solid #1a1a1a",position:"sticky",top:0,zIndex:20,background:"#0c0c0c"}}>
        {["search","favourites"].map(p=>(
          <button key={p} onClick={()=>{setPage(p);if(p==="search")setSelected(null);}} style={{
            flex:1,padding:"14px 0",background:"none",border:"none",
            borderBottom:page===p?"1px solid #d4d4d4":"1px solid transparent",
            color:page===p?"#d4d4d4":"#444",fontSize:"12px",fontFamily:mono,cursor:"pointer",
            letterSpacing:"0.08em",textTransform:"uppercase",transition:"all 0.15s",
          }}>
            {p==="favourites"?`favourites${favs.size?` (${favs.size})`:""}`:p}
          </button>
        ))}
      </div>

      {page==="search"&&!query.trim()?(
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"calc(100dvh - 47px)",padding:"0 24px"}}>
          <div style={{width:"100%",maxWidth:"400px"}}>
            <input ref={inputRef} type="text" value={query} onChange={e=>setQuery(e.target.value)}
              placeholder="english, kanji, kana, romaji..." autoFocus
              style={{width:"100%",padding:"14px 16px",background:"#111",border:"1px solid #1e1e1e",color:"#d4d4d4",fontSize:"16px",fontFamily:mono,outline:"none",borderRadius:0}}
              onFocus={e=>e.target.style.borderColor="#333"} onBlur={e=>e.target.style.borderColor="#1e1e1e"}
            />
          </div>
        </div>
      ):(
        <>
          {page==="search"&&(
            <div style={{padding:"14px 18px",borderBottom:"1px solid #1a1a1a"}}>
              <input ref={inputRef} type="text" value={query} onChange={e=>setQuery(e.target.value)}
                placeholder="english, kanji, kana, romaji..." autoFocus
                style={{width:"100%",padding:"12px 14px",background:"#111",border:"1px solid #1e1e1e",color:"#d4d4d4",fontSize:"16px",fontFamily:mono,outline:"none",borderRadius:0}}
              />
            </div>
          )}
          {listData.length===0?(
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"calc(100dvh - 120px)",color:"#2a2a2a",textAlign:"center",padding:"0 24px"}}>
              <div>
                {page==="favourites"?(
                  <><div style={{fontSize:"20px",marginBottom:"6px",color:"#333"}}>☆</div><div style={{color:"#333"}}>no saved verbs</div><div style={{color:"#222",fontSize:"11px",marginTop:"4px"}}>tap ☆ save on any verb</div></>
                ):(
                  <div style={{color:"#333"}}>no results</div>
                )}
              </div>
            </div>
          ):(
            <div>
              {listData.map((v,i)=>(
                <div key={v.japanese+v.english+i} onClick={()=>setSelected(v)} style={{
                  padding:"12px 18px",borderBottom:"1px solid #141414",cursor:"pointer",
                  display:"flex",justifyContent:"space-between",alignItems:"center",
                }}>
                  <div style={{minWidth:0}}>
                    <span style={{color:"#d4d4d4",fontFamily:sans,fontSize:"16px"}}>{v.japanese}</span>
                    <span style={{color:"#444",marginLeft:"10px",fontSize:"13px"}}>{v.english}</span>
                  </div>
                  <span style={{color:favs.has(v.japanese)?"#d4a":"#333",fontSize:"11px",flexShrink:0,marginLeft:"8px",letterSpacing:"0.05em",textTransform:"uppercase"}}>
                    {v.type==="irregular"?"irreg":v.type==="u-verb"?"u":"ru"}
                  </span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
